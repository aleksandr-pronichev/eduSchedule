{% extends "base.html" %}
{% block title %}Дисциплины - EduSchedule{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Управление дисциплинами</h3>
    <a href="{{ url_for('admin_subject_add') }}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Добавить дисциплину
    </a>
</div>
<table class="table table-striped">
    <thead>
        <tr>
            <th>#</th>
            <th>Название</th>
            <th>Занятий в расписании</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for s in subjects %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.lessons|length }}</td>
            <td>
                <a href="{{ url_for('admin_subject_edit', id=s.id) }}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                </a>
                <form method="POST" action="{{ url_for('admin_subject_delete', id=s.id) }}" class="d-inline"
                      onsubmit="return confirm('Удалить дисциплину?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
